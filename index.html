<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>早押しクイズ管理ツール</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>早押しクイズ管理ツール</h1>
            <div class="header-controls">
                <button id="syncToggleBtn" class="btn btn-sync" title="クラウド同期">
                    <span id="syncIcon">☁️</span>
                    <span id="syncStatus">同期OFF</span>
                </button>
                <button id="saveBtn" class="btn btn-primary">保存</button>
                <button id="loadBtn" class="btn btn-secondary">読み込み</button>
                <button id="importCsvBtn" class="btn btn-secondary">CSV インポート</button>
                <button id="exportCsvBtn" class="btn btn-secondary">CSV エクスポート</button>
            </div>
        </header>

        <div class="tabs">
            <button class="tab-btn active" data-tab="manage">問題集管理</button>
            <button class="tab-btn" data-tab="edit">問題編集</button>
            <button class="tab-btn" data-tab="candidates">候補リスト</button>
            <button class="tab-btn" data-tab="quiz">出題</button>
            <button class="tab-btn" data-tab="settings">設定</button>
        </div>

        <!-- 問題集管理タブ -->
        <div id="manage-tab" class="tab-content active">
            <div class="toolbar">
                <button id="newCollectionBtn" class="btn btn-primary">新規問題集</button>
                <button id="deleteCollectionBtn" class="btn btn-danger">問題集削除</button>
                <button id="newQuizBtn" class="btn btn-primary">新規問題</button>
                <button id="deleteQuizBtn" class="btn btn-danger">問題削除</button>
            </div>

            <div class="split-panel">
                <div class="panel">
                    <h3>問題集一覧</h3>
                    <select id="collectionList" size="10"></select>
                </div>
                <div class="panel">
                    <h3>問題一覧</h3>
                    <div class="filter-controls">
                        <input type="text" id="searchBox" placeholder="検索...">
                        <select id="genreFilter">
                            <option value="">全ジャンル</option>
                        </select>
                        <select id="difficultyFilter">
                            <option value="">全難易度</option>
                            <option value="1">易</option>
                            <option value="2">中</option>
                            <option value="3">難</option>
                        </select>
                    </div>
                    <div id="quizList" class="quiz-list"></div>
                </div>
            </div>
        </div>

        <!-- 問題編集タブ -->
        <div id="edit-tab" class="tab-content">
            <div class="edit-form">
                <div class="form-group">
                    <label for="questionInput">問題文:</label>
                    <textarea id="questionInput" rows="4" placeholder="問題文を入力してください"></textarea>
                    <div class="text-controls">
                        <button id="addRubyBtn" class="btn btn-small">ふりがなを付ける</button>
                        <button id="addColorBtn" class="btn btn-small">色を付ける</button>
                        <button id="showCandidatesBtn" class="btn btn-small btn-secondary">候補リストを表示</button>
                    </div>
                    <div id="candidatesSidebar" class="candidates-sidebar" style="display:none;">
                        <div class="sidebar-header">
                            <h4>候補リスト</h4>
                            <button id="closeCandidatesBtn" class="btn btn-small">×</button>
                        </div>
                        <div id="candidatesList" class="candidates-list"></div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="answerInput">答え:</label>
                    <textarea id="answerInput" rows="2" placeholder="答えを入力してください"></textarea>
                    <div class="text-controls">
                        <button id="factCheckClaudeWebBtn" class="btn btn-small btn-primary">🔍 Claude.ai で事実確認</button>
                    </div>
                </div>

                <div class="form-group">
                    <label for="memoInput">メモ:</label>
                    <textarea id="memoInput" rows="2" placeholder="メモ（オプション）"></textarea>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="genreSelect">ジャンル:</label>
                        <select id="genreSelect">
                            <option value="ノンジャンル">ノンジャンル</option>
                            <option value="アニメ&ゲーム">アニメ&ゲーム</option>
                            <option value="スポーツ">スポーツ</option>
                            <option value="芸能">芸能</option>
                            <option value="ライフスタイル">ライフスタイル</option>
                            <option value="社会">社会</option>
                            <option value="文系学問">文系学問</option>
                            <option value="理系学問">理系学問</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="difficultySelect">難易度:</label>
                        <select id="difficultySelect">
                            <option value="1">易</option>
                            <option value="2">中</option>
                            <option value="3">難</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="tagsInput">タグ (カンマ区切り):</label>
                    <input type="text" id="tagsInput" placeholder="例: ベタ問, 人名, 地名">
                </div>

                <div class="form-actions">
                    <div class="navigation-buttons">
                        <button id="prevQuizEditBtn" class="btn btn-secondary">◀ 前の問題</button>
                        <button id="nextQuizEditBtn" class="btn btn-secondary">次の問題 ▶</button>
                    </div>
                    <div class="action-buttons">
                        <button id="saveQuizBtn" class="btn btn-primary">保存</button>
                        <button id="cancelEditBtn" class="btn btn-secondary">キャンセル</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 候補リストタブ -->
        <div id="candidates-tab" class="tab-content">
            <div class="candidates-panel">
                <div class="toolbar" style="flex-wrap: wrap;">
                    <div class="form-group" style="flex: 1; min-width: 200px; margin: 0;">
                        <input type="text" id="newCandidateInput" placeholder="候補を入力..." style="width: 100%;">
                    </div>
                    <div class="form-group" style="flex: 2; min-width: 300px; margin: 0;">
                        <input type="text" id="candidateMemoInput" placeholder="メモ (オプション)" style="width: 100%;">
                    </div>
                    <button id="addCandidateBtn" class="btn btn-primary">追加</button>
                    <button id="clearCandidatesBtn" class="btn btn-danger">全削除</button>
                </div>
                <div class="candidates-grid" id="candidatesGrid"></div>
            </div>
        </div>

        <!-- 出題タブ -->
        <div id="quiz-tab" class="tab-content">
            <div class="quiz-controls">
                <button id="startQuizBtn" class="btn btn-primary">出題開始</button>
                <button id="endQuizBtn" class="btn btn-danger" style="display:none;">出題終了</button>
            </div>

            <div class="quiz-filters" id="quizFilters">
                <h3>出題設定</h3>
                <div class="form-group">
                    <label>問題集を選択:</label>
                    <div id="quizCollectionCheckboxes"></div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="quizGenreFilter">ジャンル:</label>
                        <select id="quizGenreFilter">
                            <option value="">全て</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="quizDifficultyFilter">難易度:</label>
                        <select id="quizDifficultyFilter">
                            <option value="">全て</option>
                            <option value="1">易</option>
                            <option value="2">中</option>
                            <option value="3">難</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="quiz-display" id="quizDisplay" style="display:none;">
                <div class="quiz-header">
                    <div class="quiz-info">
                        <span id="quizCounter">1 / 1</span>
                        <span id="quizGenreTag" class="genre-tag"></span>
                        <span id="quizDifficultyTag" class="difficulty-tag"></span>
                    </div>
                    <div class="quiz-controls">
                        <button id="prevQuizBtn" class="btn btn-small">◀</button>
                        <button id="toggleAnswerBtn" class="btn btn-primary btn-small">答えを表示</button>
                        <button id="nextQuizBtn" class="btn btn-small">▶</button>
                        <button id="randomQuizBtn" class="btn btn-small">🔀 シャッフル</button>
                    </div>
                </div>

                <div class="quiz-question-display">
                    <h2>問題</h2>
                    <div id="questionDisplay" class="question-text"></div>
                </div>

                <div id="answerDisplay" class="answer-display" style="display:none;">
                    <h3>答え</h3>
                    <div id="answerText" class="answer-text"></div>
                </div>

                <div id="memoDisplay" class="memo-display" style="display:none;">
                    <h3>メモ</h3>
                    <div id="memoText" class="memo-text"></div>
                </div>
            </div>
        </div>

        <!-- 設定タブ -->
        <div id="settings-tab" class="tab-content">
            <div class="settings-panel">
                <h3>表示設定</h3>
                <div class="form-group">
                    <label for="fontSizeSlider">フォントサイズ: <span id="fontSizeValue">14</span>px</label>
                    <input type="range" id="fontSizeSlider" min="10" max="24" value="14" step="1">
                </div>
                <div class="form-group">
                    <label for="quizFontSizeSlider">出題時フォントサイズ: <span id="quizFontSizeValue">20</span>px</label>
                    <input type="range" id="quizFontSizeSlider" min="16" max="48" value="20" step="2">
                </div>
            </div>


            <div class="settings-panel">
                <h3>データ管理</h3>
                <button id="clearDataBtn" class="btn btn-danger">全データをクリア</button>
                <p class="warning-text">※注意: この操作は元に戻せません</p>
            </div>
        </div>
    </div>

    <input type="file" id="fileInput" style="display:none;" accept=".json">
    <input type="file" id="csvFileInput" style="display:none;" accept=".csv">

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
        import { getFirestore, collection, getDocs, addDoc, updateDoc, deleteDoc, doc, onSnapshot, setDoc, getDoc } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';
        
        // Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyBbRH1NIdQ9qyRZ2ca_JHMGGXLcFmjGQnU",
            authDomain: "quizbook-72cda.firebaseapp.com",
            projectId: "quizbook-72cda",
            storageBucket: "quizbook-72cda.firebasestorage.app",
            messagingSenderId: "599299941857",
            appId: "1:599299941857:web:06aef045d3abbf3c94dea0"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Make Firebase available globally
        window.firebaseDB = db;
        window.firebaseUtils = {
            collection,
            getDocs,
            addDoc,
            updateDoc,
            deleteDoc,
            doc,
            onSnapshot,
            setDoc,
            getDoc
        };
    </script>

    <script src="firebase-sync.js"></script>
    <script src="app.js"></script>
</body>
</html>
