<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>クイズ事実確認</title>
    <style>
        body {
            width: 300px;
            padding: 20px;
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
        }
        h1 {
            font-size: 18px;
            margin: 0 0 15px 0;
            color: #333;
        }
        p {
            font-size: 14px;
            line-height: 1.6;
            color: #666;
            margin: 10px 0;
        }
        .status {
            padding: 10px;
            background: #e8f5e9;
            border-radius: 4px;
            font-size: 13px;
            color: #2e7d32;
        }
        .version {
            font-size: 12px;
            color: #999;
            text-align: center;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <h1>🎯 クイズ事実確認</h1>
    <div class="status">
        ✅ 拡張機能は正常に動作しています
    </div>
    <p>
        クイズ管理ツールの「Claude.aiで確認」ボタンをクリックすると、
        自動的にClaude.aiに質問が送信されます。
    </p>
    <p>
        <strong>使い方:</strong><br>
        1. クイズ管理ツールで問題を入力<br>
        2. 「Claude.aiで確認」ボタンをクリック<br>
        3. 自動で送信完了！
    </p>
    <div class="version">v1.0.0</div>
</body>
</html>
